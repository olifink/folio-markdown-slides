<div class="drawer-header">
  <div class="header-actions">
    <button
      mat-icon-button
      [attr.aria-label]="colorSchemeLabel()"
      [matTooltip]="colorSchemeLabel()"
      (click)="store.cycleColorScheme()"
    >
      <mat-icon>{{ colorSchemeIcon() }}</mat-icon>
    </button>
    
    <button mat-icon-button (click)="onShowSettings()" aria-label="Open settings" matTooltip="Settings">
      <mat-icon>settings</mat-icon>
    </button>
  </div>

  <div class="create-actions">
    <button mat-icon-button (click)="onNewProse()" matTooltip="New prose document">
      <mat-icon>add_notes</mat-icon>
    </button>
    <button mat-icon-button (click)="onNewPresentation()" matTooltip="New presentation slides">
      <mat-icon>slideshow</mat-icon>
    </button>
  </div>
</div>

<div class="presentation-list">
  @for (file of store.fileList(); track file) {
    <div class="presentation-card"
         [class.active]="store.currentFile() === file"
         (click)="onFileClick(file)">
      
      @if (store.currentFile() === file) {
        <div class="active-indicator"></div>
      }
      
      <mat-icon class="file-icon">description</mat-icon>
      <span class="filename">{{ file }}</span>
      
      <div class="actions">
        @if (store.currentFile() === file && store.isDirty()) {
          <div class="dirty-indicator" matTooltip="Unsaved changes"></div>
        }
        
        <button mat-icon-button class="delete-button" 
                (click)="onDelete($event, file)" 
                matTooltip="Delete document">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </div>
    </div>
  } @empty {
    <div class="empty-state">
      <p>No documents yet.</p>
      <div class="empty-actions">
        <button mat-flat-button (click)="onNewProse()">
          Create prose
        </button>
        <button mat-flat-button (click)="onNewPresentation()">
          Create slides
        </button>
      </div>
    </div>
  }
</div>

<div class="drawer-footer">
  <button mat-fab extended color="tertiary" (click)="onNewProse()" class="new-fab">
    <mat-icon>add</mat-icon>
    New document
  </button>
</div>
