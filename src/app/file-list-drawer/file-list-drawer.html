<div class="drawer-header">
  <div class="header-actions">
    <a mat-icon-button 
       href="https://buymeacoffee.com/lemonslice" 
       target="_blank" 
       rel="noopener noreferrer"
       aria-label="Support the developer" 
       matTooltip="Buy me a coffee">
      <mat-icon>coffee</mat-icon>
    </a>

    <button mat-icon-button (click)="onDownloadAll()" aria-label="Download all files as ZIP" matTooltip="Download all (ZIP)">
      <mat-icon>file_download</mat-icon>
    </button>

    <button mat-icon-button (click)="onShowSettings()" aria-label="Open settings" matTooltip="Settings">
      <mat-icon>settings</mat-icon>
    </button>
  </div>
</div>

<div class="presentation-list">
  @for (file of store.fileList(); track file) {
    <div class="presentation-card"
         [class.active]="store.currentFile() === file"
         (click)="onFileClick(file)">
      
      @if (store.currentFile() === file) {
        <div class="active-indicator"></div>
      }
      
      <mat-icon class="file-icon">
        {{ file.endsWith('.slides.md') ? 'slideshow' : 'description' }}
      </mat-icon>
      <span class="filename">{{ file }}</span>
      
      <div class="actions">
        @if (store.currentFile() === file && store.isDirty()) {
          <div class="dirty-indicator" matTooltip="Unsaved changes"></div>
        }
        
        <button mat-icon-button class="delete-button" 
                (click)="onDelete($event, file)" 
                matTooltip="Delete document">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </div>
    </div>
  } @empty {
    <div class="empty-state">
      <p>No documents yet.</p>
      <div class="empty-actions">
        <button mat-flat-button (click)="onNewProse()">
          Create prose
        </button>
        <button mat-flat-button (click)="onNewSlides()">
          Create slides
        </button>
      </div>
    </div>
  }
</div>

<div class="drawer-footer">
  <button mat-fab extended color="tertiary" [matMenuTriggerFor]="createMenu" class="new-fab">
    <mat-icon>add</mat-icon>
    New
  </button>
  
  <mat-menu #createMenu="matMenu">
    <button mat-menu-item (click)="onNewProse()">
      <mat-icon>description</mat-icon>
      <span>Text Document</span>
    </button>
    <button mat-menu-item (click)="onNewSlides()">
      <mat-icon>slideshow</mat-icon>
      <span>Presentation Slides</span>
    </button>
  </mat-menu>
</div>
