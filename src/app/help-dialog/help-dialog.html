<div class="dialog-header">
  <h2 mat-dialog-title>Folio Cheatsheet</h2>
  <button mat-icon-button (click)="close()" aria-label="Close dialog">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content>
  <div class="cheatsheet-grid">
    @for (section of sections; track section.title) {
      <div class="section">
        <h3 class="section-title">{{ section.title }}</h3>
        <div class="items-list">
          @for (item of section.items; track item.label) {
            <div class="item">
              <div class="item-header">
                <span class="item-label">{{ item.label }}</span>
                <span class="item-description">{{ item.hint }}</span>
              </div>
              <button class="snippet-button" (click)="insert(item)" matTooltip="Insert into editor">
                <code>{{ item.snippet || (item.prefix + '...' + item.suffix) }}</code>
              </button>
            </div>
          }
        </div>
      </div>
    }
  </div>
</mat-dialog-content>

<div class="dialog-footer">
  <p class="footer-hint">Click any code snippet to insert it into your editor at the current cursor position.</p>
</div>
