<mat-drawer-container class="app-container">
  <mat-drawer #drawer mode="over" class="file-drawer">
    <app-file-list-drawer (closeDrawer)="drawer.close()"></app-file-list-drawer>
  </mat-drawer>

  <mat-drawer-content class="app-content">
    <mat-toolbar class="toolbar" role="banner">
      <button mat-icon-button (click)="drawer.toggle()" aria-label="Open file list">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar__brand">Folio</span>

      <div class="toolbar__title-container">
        @if (isEditingTitle()) {
          <input 
            #titleInput
            type="text" 
            class="toolbar__title-input"
            [value]="editValue()"
            (input)="editValue.set(titleInput.value)"
            (blur)="finishRename()"
            (keydown)="onTitleKeydown($event)"
            aria-label="Rename document"
          >
        } @else {
          <button 
            mat-button 
            class="toolbar__file-chip" 
            (click)="onTitleClick()" 
            aria-label="Rename document"
            matTooltip="Rename document"
          >
            <mat-icon class="toolbar__file-icon">
              {{ store.currentFile()?.endsWith('.slides.md') ? 'slideshow' : 'description' }}
            </mat-icon>
            <span class="toolbar__filename">{{ displayedFileName() }}</span>
          </button>
        }

      </div>

      @if (store.isDirty()) {
        <div class="toolbar__dirty-indicator" matTooltip="Unsaved changes"></div>
      }

      <span class="toolbar__spacer"></span>

      @if (store.driveEnabled()) {
        <button mat-icon-button (click)="store.syncNow()" 
          [disabled]="store.syncStatus() === 'syncing'"
          [matTooltip]="store.syncStatus() === 'syncing' ? 'Syncing...' : 'Sync with Google Drive'" 
          aria-label="Sync with Google Drive">
          <mat-icon [class.spinning]="store.syncStatus() === 'syncing'">sync</mat-icon>
        </button>
      }

      <button mat-icon-button [matMenuTriggerFor]="exportMenu" aria-label="Export document" matTooltip="Export">
        <mat-icon>download</mat-icon>
      </button>
      <mat-menu #exportMenu="matMenu" xPosition="before">
        <button mat-menu-item (click)="onDownloadMd()">
          <mat-icon>description</mat-icon>
          <span>Download Markdown (.md)</span>
        </button>
        <button mat-menu-item (click)="onDownloadHtml()">
          <mat-icon>html</mat-icon>
          <span>Export HTML (.html)</span>
        </button>
        <button mat-menu-item (click)="onPrintPdf()">
          <mat-icon>picture_as_pdf</mat-icon>
          <span>Print to PDF</span>
        </button>
      </mat-menu>

      @if (isWide() && store.documentType() === 'prose') {
        <button mat-icon-button (click)="store.togglePreview()" 
          [matTooltip]="store.previewVisible() ? 'Hide Preview' : 'Show Preview'"
          aria-label="Toggle preview visibility">
          <mat-icon>{{ store.previewVisible() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      }

      <button mat-icon-button (click)="onShowHelp()" aria-label="Show cheatsheet" matTooltip="Help">
        <mat-icon>help_outline</mat-icon>
      </button>
    </mat-toolbar>

    @if (isWide()) {
      <div #splitPane class="split-pane" role="main" 
        [class.is-dragging]="isDragging()"
        [class.preview-hidden]="!store.previewVisible() && store.documentType() === 'prose'"
        [style.grid-template-columns]="(store.previewVisible() || store.documentType() === 'slides') ? (store.editorWidth() + 'px 1px 1fr') : '1fr'">
        
        <div class="split-pane__shield" [class.active]="isDragging()"></div>

        <app-editor-pane class="split-pane__editor" />
        <div
          class="split-pane__divider"
          role="separator"
          aria-orientation="vertical"
          cdkDrag
          cdkDragLockAxis="x"
          (mousedown)="onDragStart()"
          (cdkDragStarted)="onDragStart()"
          (cdkDragEnded)="onDragEnd()"
          (cdkDragMoved)="onResize($event)"
        ></div>
        <app-preview-pane class="split-pane__preview" [active]="true" />
      </div>
    } @else {
      <mat-tab-group class="tab-group" animationDuration="200ms" role="main"
        aria-label="Editor and Preview tabs"
        [selectedIndex]="store.selectedTab()"
        (selectedIndexChange)="store.setSelectedTab($event)"
        (touchstart)="onTouchStart($event)"
        (touchend)="onTouchEnd($event)">
        <mat-tab label="Edit">
          <app-editor-pane [active]="store.selectedTab() === 0" />
        </mat-tab>
        <mat-tab label="Preview">
          <app-preview-pane [active]="store.selectedTab() === 1" (backToEditor)="store.setSelectedTab(0)" />
        </mat-tab>
      </mat-tab-group>
    }
  </mat-drawer-content>
</mat-drawer-container>
